<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 관리 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #2f855a; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; color: white; text-decoration: none; margin-right: 8px; }
        .btn-create { background: #2f855a; }
        .btn-create:hover { background: #276749; }
        .btn-back { background: #6c757d; }
        .btn-back:hover { background: #545b62; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin: 16px 0; }
        .alert-error { background: #fff5f5; border: 1px solid #f5c6cb; color: #c53030; padding: 12px 16px; border-radius: 4px; margin: 16px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 18px; }
        th { background: #2f855a; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f7fafc; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.05em; }
        .btn-delete { background: none; border: none; color: #c53030; cursor: pointer; padding: 0; text-decoration: underline; font-size: 0.95em; }
        .btn-delete:hover { color: #9b2c2c; }
    </style>
</head>
<body>

    <h1>카테고리 관리</h1>

    <a class="btn btn-create" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
    <a class="btn btn-back" th:href="@{/products}">← 상품 목록으로 돌아가기</a>

    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}">성공 메시지</div>
    <div class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}">오류 메시지</div>

    <div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
        등록된 카테고리가 없습니다. 새 카테고리를 등록해 주세요.
    </div>

    <table th:unless="${#lists.isEmpty(categories)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">전자제품</td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}"
                          method="post"
                          style="display: inline;"
                          onsubmit="return confirm('이 카테고리를 삭제하시겠습니까?');">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:replace="~{layouts/footer :: assignmentFooter}"></div>

</body>
</html>
